[Program]
ffmpeg_path=../qpdf

[Window]
width=1024
height=701
geometry=@ByteArray(\x1\xd9\xd0\xcb\0\x3\0\0\0\0\x1J\0\0\0\xce\0\0\x5I\0\0\x3\xa9\0\0\x1J\0\0\0\xed\0\0\x5I\0\0\x3\xa9\0\0\0\0\0\0\0\0\a\x80\0\0\x1J\0\0\0\xed\0\0\x5I\0\0\x3\xa9)
console_min_height=400
console_max_history_rows=1000

[Options]
opt1=%1 output %5 uncompress
opt2="=%1 output %5 compress"

[Combinations]
Compress_PDF="--compress-streams=y --object-streams=generate %1 %5"
Compress_PDF_max="--compress-streams=y --object-streams=generate --recompress-flate --compression-level=9 --optimize-images %1 %5"
Decompress_PDF="--stream-data=uncompress %1 %5"
Encrypt_PDF=%1 --encrypt MyOpenPassword MyOwnerPassword 256 -- %5
Decrypt_PDF="--password=MyOwnerPassword --decrypt %1 %5"
Help=--help
Help_usage="--help=usage"
extractAudioFromVideo=-i %1 -vn -acodec libmp3lame %5
muxVideoWithAudio1=-i %1 -i %2 -c:v copy -c:a aac -map 0:v:0 -map 1:a:0 %5
Burst_PDF_into_single_pages=%1 %5_page-%d.pdf --split-pages
