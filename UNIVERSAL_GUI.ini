[Program]
ffmpeg_path=../ffmpeg

[Window]
width=1133
height=701
geometry=@ByteArray(\x1\xd9\xd0\xcb\0\x3\0\0\0\0\0\xaa\0\0\0\xd4\0\0\x5\x16\0\0\x3\xaf\0\0\0\xaa\0\0\0\xf3\0\0\x5\x16\0\0\x3\xaf\0\0\0\0\0\0\0\0\a\x80\0\0\0\xaa\0\0\0\xf3\0\0\x5\x16\0\0\x3\xaf)
console_min_height=400
console_max_history_rows=1000

[Options]
opt1=-i %1 -i %2 -c:v copy -c:a aac %5
opt2="-i %1 -i %2 -i %3 -filter_complex amix=inputs=2 %5"

[Combinations]
ExtractAudioFromVideo=-i %1 -vn -acodec libmp3lame %5
MuxVideoWithAudio1=-i %1 -i %2 -c:v copy -c:a aac -map 0:v:0 -map 1:a:0 %5
Intel_Iris_transcode_to_MP4_yuv420p=-hwaccel d3d11va -i %1 -c:v h264_qsv -pix_fmt nv12 -global_quality 23 -c:a aac -b:a 256k %5_transcoded.mp4
MixAllAudio="-i %2 -i %3 -i %4 -filter_complex amix=inputs=3:duration=first %5"
Show_decoders=-decoders
Show_encoders=-encoders
Show_info_about_ffmpeg=-i %1
Video_cut_no_conversion=-i %1 -c:v copy -c:a copy -ss 0 -t 00:01:08 %5
best_H265_encoder_slow=-i %1 -c:v libx265 -pix_fmt yuv444p -crf 18 -preset slow %5
best_H265_encoder_medium=-i %1 -c:v libx265 -pix_fmt yuv444p -crf 18 -preset medium %5
best_H265_encoder_fast=-i %1 -c:v libx265 -pix_fmt yuv444p -crf 18 -preset fast %5
add_two_subtitles_to_mkv="-y -loglevel \"repeat+info\" -i %1 -i %1_sub1.srt -i %1_sub2.srt -c copy -map 0 -dn -map \"-0:s\" -map \"-0:d\" -map \"1:0\" \"-metadata:s:s:0\" \"language=ita\" \"-metadata:s:s:0\" \"handler_name=Italian\"  \"-metadata:s:s:0\" \"title=Italian\" -map \"2:0\" \"-metadata:s:s:1\" \"language=eng\" \"-metadata:s:s:1\" \"handler_name=English\" \"-metadata:s:s:1\" \"title=English\" %5"
audio-extraction_no_conversion=-i %1 -vn -c:a copy %5
audio-extraction_no_conversion_wav_format=-i %1 -vn -c:a copy %5_audio.wav
audio-extraction_to_aac=-i %1 -c:v none -c:a aac -b:a 256k %5.aac
audio-video_join_merge=-i %1 -i %2 -c:v copy -c:a copy %5_merged.mp4
convert_audio_to_AAC=-i %1 -c:a aac -b:a 192k %5_merged3.aac
convert_mkv_to_mp4=-i %1 -c:v copy -c:a copy %1.mp4
convert_to_10bit_HEVC_X265_yuv422p10le_mp4=-i %1 -c:v libx265 -preset medium -crf 18 -pix_fmt yuv422p10le -sws_flags spline+accurate_rnd+full_chroma_int -color_range 1 -colorspace 5 -color_primaries 5 -color_trc 6 -c:a aac -b:a 256k %5_video_x265_out.mp4
convert_to_10bit_HEVC_X265_yuv422p10le_mp4_acopy_VariableFrameRate_medium_quality=-i %1 -c:v libx265 -preset medium -crf 32 -pix_fmt yuv422p10le -sws_flags spline+accurate_rnd+full_chroma_int -color_range 1 -colorspace 5 -color_primaries 5 -color_trc 6 -c:a copy -vsync vfr %5_video_x265_out.mp4
convert_to_10bit_HEVC_X265_yuv422p10le_mp4_audioCopy_VariableFrameRate=-i %1 -c:v libx265 -preset medium -crf 18 -pix_fmt yuv422p10le -sws_flags spline+accurate_rnd+full_chroma_int -color_range 1 -colorspace 5 -color_primaries 5 -color_trc 6 -c:a copy -vsync vfr %5_video_x265_out.mp4
convert_to_10bit_HEVC_X265_yuv444p10le_mp4=-i %1 -c:v libx265 -preset medium -crf 18 -pix_fmt yuv444p10le -sws_flags spline+accurate_rnd+full_chroma_int -color_range 1 -colorspace 5 -color_primaries 5 -color_trc 6 -c:a aac -b:a 256k %5_video_x265_out.mp4
convert_to_10bit_HEVC_X265_yuv444p10le_mp4_best=-i %1 -c:v libx265 -preset medium -crf 10 -pix_fmt yuv444p10le -sws_flags spline+accurate_rnd+full_chroma_int -color_range 1 -colorspace 5 -color_primaries 5 -color_trc 6 -c:a aac -b:a 256k %5_video_x265_out.mp4
convert_to_mp3=-i %1 %5.mp3
convert_to_mp3_libmp3lame_best_quality=-i %1 -codec:a libmp3lame -qscale:a 0 %5.mp3
convert_to_mp3_libmp3lame_best_quality2=-i %1 -codec:a libmp3lame -qscale:a 0 -b:a 320k %5.mp3
converter_avi_to_HEVC_X265_mp4=-i %1 -c:v libx265 -preset medium -crf 8 -pix_fmt yuv420p10le -sws_flags spline+accurate_rnd+full_chroma_int -color_range 1 -colorspace 5 -color_primaries 5 -color_trc 6 -c:a aac -b:a 256k %5_output.mp4
converter_avi_to_HEVC_X265_mp4_NVIDIA_accel=-hwaccel cuvid -i %1 -pix_fmt p010le -c:v hevc_nvenc -preset slow -rc vbr_hq -b:v 6M -maxrate:v 10M -c:a aac -b:a 240k %5_output.mp4
converter_png_to_10bit_HEVC_X265_mp4=-r 50 -start_number 0 -i C:\tmp%04d.png -c:v libx265 -preset medium -crf 18 -pix_fmt yuv420p10le -sws_flags spline+accurate_rnd+full_chroma_int -color_range 1 -colorspace 5 -color_primaries 5 -color_trc 6 -c:a aac -b:a 256k C:\tmp\video_x265_out.mp4
converter_png_to_10bit_HEVC_X265_mp4_DaVinci=-r 50 -start_number 180000 -i C:\tmpxportntitled%08d.exr -c:v libx265 -preset medium -crf 18 -pix_fmt yuv420p10le -sws_flags spline+accurate_rnd+full_chroma_int -color_range 1 -colorspace 5 -color_primaries 5 -color_trc 6 -c:a aac -b:a 256k C:\tmpxport\video_x265_out.mp4
converter_png_to_10bit_HEVC_X265_mp4_with_audio=-r 50 -start_number 0 -i C:\tmp%04d.png -i C:\tmp\audio.mp4 -c:v libx265 -preset medium -crf 18 -pix_fmt yuv420p10le -sws_flags spline+accurate_rnd+full_chroma_int -color_range 1 -colorspace 5 -color_primaries 5 -color_trc 6 -c:a aac -b:a 256k C:\tmp\video_x265_out.mp4
converter_png_to_ico=-i %1 %5_bmp.ico
copy_fastest_start10s_duration120s=-ss 0:0:00 -i %1 -codec copy -t 0:2:00 %5.mov
copy_fastestNVENC_start0s_duration120s=-ss 0:0:00 -i %1 -c:v h264_nvenc -preset fast -qp 30 -c:a copy -t 0:2:00 %5_conv.mov
copy_ultrafastINTEL_start0s_duration120s=-ss 0:0:00 -i %1 -c:v libx264 -preset ultrafast -crf 30 -c:a copy -t 0:2:00 %5_conv.mp4
detect_variable_framerate=-i %1 -vf vfrdet -an -f null -
normal_convert_default_options=-i %1 %1.mp4
normal_convert_default_options_start10s_duration20s=-ss 0:0:10 -i %1 -t 0:0:20 %5.mp4
replace_1st_audio_in_video_to_MKV=-i %1 -i %2 -c:v copy -c:a copy -map 0:v:0 -map 1:a:0 %5_merged.mkv
replace_1st_audio_in_video_to_MP4=-i %2 -i %1 -c:v copy -c:a copy -map 0:v:0 -map 1:a:0 %5_merged2.mp4
